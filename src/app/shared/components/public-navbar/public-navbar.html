<header class="sticky top-0 z-50 bg-white/70 backdrop-blur-lg border-b border-gray-200">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-10 flex items-center justify-between h-16">
    <a routerLink="/" class="text-[1.375rem] font-extrabold text-primary-500 tracking-tight no-underline">Qatra</a>
    <nav class="flex items-center gap-2">
      <a class="px-3 py-2 rounded-xl text-sm text-gray-600 hover:text-primary-600 transition-colors" routerLink="/contact">Contact Us</a>

      @if (authStore.isAuthenticated()) {
        <p-menu #userMenu [model]="menuItems()" [popup]="true" />
        <button pButton type="button" class="w-9 h-9 rounded-full bg-red-500 text-white" (click)="userMenu.toggle($event)" ariaLabel="User menu">
            <i class="pi pi-user"></i>
        </button>
      } @else {
        <a class="px-3 py-2 rounded-full bg-red-500 text-white" routerLink="/auth/login" ariaLabel="Sign In"><i class="pi pi-sign-in"></i></a>
        <a class="px-3 py-2 rounded-full bg-gray-200" routerLink="/auth/register" ariaLabel="Sign Up"><i class="pi pi-user-plus"></i></a>
      }
    </nav>
  </div>
</header>
