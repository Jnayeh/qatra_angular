<div class="flex items-center justify-between p-3">
    <span class="text-sm font-medium text-gray-700">Use my current location</span>
    <p-toggleswitch [formControl]="$any(useGpsControl)" />
</div>
<div class="bg-gray-100 rounded-xl overflow-hidden border border-gray-200">
  <div #mapContainer class="w-full h-44"></div>
  <div class="p-3 space-y-3">
    <div class="flex items-center gap-2 text-sm">
      <svg class="w-4 h-4 text-primary-500" viewBox="0 0 48 48" fill="none"><path d="M24 6a12 12 0 0 0-12 12c0 8 12 24 12 24s12-16 12-24A12 12 0 0 0 24 6Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M24 13c0 0-4 4.5-4 7a4 4 0 0 0 8 0C28 17.5 24 13 24 13Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
      @if (selectedLat() !== null && selectedLng() !== null) {
        <span class="text-gray-700 font-medium">{{ selectedLat()!.toFixed(4) }}, {{ selectedLng()!.toFixed(4) }}</span>
      } @else {
        <span class="text-gray-400">Click on the map to select a location</span>
      }
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-gray-700">City</label>
        <input type="text" [formControl]="$any(locationForm().get('city'))" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm" placeholder="e.g. Tunis" />
      </div>
      <div class="flex flex-col gap-1.5">
        <label class="text-sm font-medium text-gray-700">Country</label>
        <input type="text" [formControl]="$any(locationForm().get('country'))" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm" />
      </div>
    </div>

    @if (error()) {
      <p-message severity="error" variant="simple" size="small">{{ error() }}</p-message>
    }

  </div>
</div>
