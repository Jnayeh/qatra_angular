<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Health Restriction Overrides</h1>
    <p class="text-sm text-gray-500 mt-1">Override permanent ineligibility status for donors with health restrictions.</p>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 p-5">
    <div class="flex gap-3 items-end">
      <div class="flex flex-col gap-1.5">
        <label for="donorId" class="text-sm font-medium text-gray-700">Donor ID</label>
        <input
          pInputText
          id="donorId"
          type="number"
          [ngModel]="searchDonorId()"
          (ngModelChange)="searchDonorId.set($event)"
          class="w-48"
          placeholder="Enter donor ID"
        />
      </div>
      <p-button
        label="Override Restriction"
        icon="pi pi-check"
        severity="warn"
        [disabled]="!searchDonorId()"
        (click)="searchAndOpen(searchDonorId()!)"
      />
    </div>
  </div>

  <p-dialog
    [header]="'Override Status'"
    [visible]="showOverrideDialog()"
    (visibleChange)="showOverrideDialog.set($event)"
    [modal]="true"
    [style]="{ width: '400px' }"
    [closable]="true"
  >
    @if (selectedUser(); as user) {
      <div class="space-y-4">
        <p class="text-sm text-gray-500">
          Are you sure you want to override the permanent ineligibility status for donor ID
          <span class="font-medium text-gray-900">{{ user.donorId }}</span>?
        </p>
        <div class="flex flex-col gap-1.5">
          <label for="overrideReason" class="text-sm font-medium text-gray-700">Reason (optional)</label>
          <input
            pInputText
            id="overrideReason"
            [(ngModel)]="overrideReason"
            class="w-full"
            placeholder="Enter reason for override"
          />
        </div>
      </div>
    }
    <ng-template pTemplate="footer">
      <div class="flex justify-end gap-2">
        <p-button label="Cancel" severity="secondary" [text]="true" (click)="showOverrideDialog.set(false)" />
        <p-button label="Confirm Override" severity="warn" [loading]="isOverriding()" (click)="overrideStatus()" />
      </div>
    </ng-template>
  </p-dialog>
</div>
