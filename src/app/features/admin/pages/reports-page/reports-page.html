<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Reports</h1>
    <p class="text-sm text-gray-500 mt-1">Generate and export system reports for analysis.</p>
  </div>

  <p-card>
    <ng-template pTemplate="content">
      <div class="flex flex-wrap items-center gap-4">
        <div class="flex flex-col gap-1.5">
          <label for="fromDp" class="text-sm font-medium text-gray-700">From</label>
          <p-datepicker [(ngModel)]="dateFrom" inputId="fromDp" class="w-36" />
        </div>
        <div class="flex flex-col gap-1.5">
          <label for="toDp" class="text-sm font-medium text-gray-700">To</label>
          <p-datepicker [(ngModel)]="dateTo" inputId="toDp" class="w-36" />
        </div>
        <div class="flex flex-col gap-1.5">
          <label for="reportType" class="text-sm font-medium text-gray-700">Report Type</label>
          <p-select [(ngModel)]="reportType" inputId="reportType" [options]="reportTypeOptions" optionValue="value" optionLabel="label" class="w-44" />
        </div>
        <p-button severity="primary" (click)="generate()" [disabled]="generating()" class="mt-5">
          @if (generating()) {
            <p-progressSpinner styleClass="w-5 h-5" strokeWidth="4" />
          } @else {
            Generate
          }
        </p-button>
      </div>
    </ng-template>
  </p-card>

  @if (reportData().length > 0) {
    <p-card styleClass="overflow-hidden">
      <ng-template pTemplate="title">Results</ng-template>
      <ng-template pTemplate="content">
        <p-table [value]="reportData()" [tableStyle]="{'min-width': '50rem'}">
          <ng-template pTemplate="header">
            <tr>
              @for (col of reportColumns(); track col) {
                <th class="text-gray-500 uppercase text-xs">{{ col }}</th>
              }
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-row>
            <tr class="hover:bg-gray-50 transition-colors">
              @for (col of reportColumns(); track col) {
                <td class="text-gray-900">{{ row[col] }}</td>
              }
            </tr>
          </ng-template>
        </p-table>
      </ng-template>
      <ng-template pTemplate="footer">
        <div class="flex justify-end">
          <p-button label="Export CSV" icon="pi pi-download" severity="secondary" styleClass="p-button-outlined" (click)="exportCsv()" />
        </div>
      </ng-template>
    </p-card>
  }
</div>
