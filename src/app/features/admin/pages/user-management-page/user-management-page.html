<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">User Management</h1>
    <p class="text-sm text-gray-500 mt-1">View and manage all registered users in the system.</p>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 p-5">
    <p-table [value]="users()" [tableStyle]="{'min-width': '50rem'}">
      <ng-template pTemplate="header">
        <tr>
          <th class="text-gray-500">Name</th>
          <th class="text-gray-500">Email</th>
          <th class="text-gray-500">Status</th>
          <th class="text-gray-500">Roles</th>
          <th class="text-gray-500">Actions</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-u>
        <tr>
          <td class="text-gray-900">{{ u.displayName }}</td>
          <td class="text-gray-900">{{ u.email }}</td>
          <td><app-status-badge [status]="u.status" /></td>
          <td class="text-gray-900">{{ u.roles.join(', ') }}</td>
          <td>
            <p-button icon="pi pi-eye" [rounded]="true" [text]="true" severity="secondary" [routerLink]="['/admin/users', u.id]" />
          </td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>
