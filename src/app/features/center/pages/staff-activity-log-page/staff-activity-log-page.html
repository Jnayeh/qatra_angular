<div class="max-w-5xl mx-auto space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Staff Activity Log</h1>
    <p class="text-sm text-gray-500 mt-1">Track actions and changes made by staff at this center.</p>
  </div>

  @if (loading()) {
    <app-loading-spinner />
  } @else if (logs().length === 0) {
    <app-empty-state
      icon="pi-history"
      title="No activity logs"
      message="There are no audit log entries for this center yet."
    />
  } @else {
    <div class="bg-white rounded-xl border border-gray-200">
      <div class="p-5">
        <p-table [value]="logs()" [tableStyle]="{ 'min-width': '50rem' }">
          <ng-template pTemplate="header">
            <tr>
              <th class="text-gray-500">Timestamp</th>
              <th class="text-gray-500">Action</th>
              <th class="text-gray-500">Entity Type</th>
              <th class="text-gray-500">User</th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-log>
            <tr class="hover:bg-gray-50 transition-colors">
              <td class="text-gray-900 text-sm">{{ log.timestamp }}</td>
              <td class="text-gray-900">{{ log.action }}</td>
              <td class="text-gray-900">{{ log.entityType }}</td>
              <td class="text-gray-900 text-sm">#{{ log.userId }}</td>
            </tr>
          </ng-template>
        </p-table>
      </div>
      <div class="px-5 py-3 border-t border-gray-100">
        <div class="flex items-center justify-between">
          <p-button
            icon="pi pi-chevron-left"
            severity="secondary"
            styleClass="p-button-text p-button-sm"
            [disabled]="page() === 0"
            (click)="prevPage()"
          />
          <span class="text-sm text-gray-500">Page {{ page() + 1 }} of {{ totalPages() }}</span>
          <p-button
            icon="pi pi-chevron-right"
            severity="secondary"
            styleClass="p-button-text p-button-sm"
            [disabled]="page() >= totalPages() - 1"
            (click)="nextPage()"
          />
        </div>
      </div>
    </div>
  }
</div>
