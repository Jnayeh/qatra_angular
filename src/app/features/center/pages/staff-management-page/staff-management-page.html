<p-toast />
<div class="max-w-4xl mx-auto space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Staff Management</h1>
      <p class="text-sm text-gray-500 mt-1">Manage staff members assigned to this center.</p>
    </div>
    <p-button label="Add Staff" icon="pi pi-plus" (click)="showAddDialog.set(true)" />
  </div>

  @if (loading()) {
    <app-loading-spinner />
  } @else if (staff().length === 0) {
    <app-empty-state
      icon="pi-users"
      title="No staff members"
      message="There are no staff members assigned to this center yet."
      (action)="showAddDialog.set(true)"
      actionLabel="Add Staff Member"
    />
  } @else {
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <ul class="divide-y divide-gray-100">
        @for (member of staff(); track member.userId) {
          <li class="flex items-center justify-between py-3">
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 rounded-full bg-primary-50 flex items-center justify-center">
                <span class="text-primary-500 font-semibold text-sm">{{ member.userId }}</span>
              </div>
              <div>
                <p class="text-sm font-medium text-gray-900">Staff #{{ member.userId }}</p>
                <p class="text-xs text-gray-500">Center #{{ member.centerId }}</p>
              </div>
            </div>
            <p-button
              label="Remove"
              severity="danger"
              styleClass="p-button-text p-button-sm"
              (click)="removeStaff(member.userId)"
            />
          </li>
        }
      </ul>
    </div>
  }

  <p-dialog
    header="Add Staff Member"
    [visible]="showAddDialog()"
    (visibleChange)="showAddDialog.set($event)"
    [modal]="true"
    [style]="{ width: '28rem' }"
    [draggable]="false"
    [resizable]="false"
  >
    <div class="flex flex-col gap-4">
      <div class="grid grid-cols-2 gap-3">
        <div class="flex flex-col gap-1">
          <label for="firstName" class="text-sm font-medium text-gray-700">First Name *</label>
          <input
            pInputText
            id="firstName"
            placeholder="First name"
            [ngModel]="newFirstName()"
            (ngModelChange)="newFirstName.set($event)"
            class="w-full"
          />
        </div>
        <div class="flex flex-col gap-1">
          <label for="familyName" class="text-sm font-medium text-gray-700">Family Name *</label>
          <input
            pInputText
            id="familyName"
            placeholder="Family name"
            [ngModel]="newFamilyName()"
            (ngModelChange)="newFamilyName.set($event)"
            class="w-full"
          />
        </div>
      </div>
      <div class="flex flex-col gap-1">
        <label for="email" class="text-sm font-medium text-gray-700">Email *</label>
        <input
          pInputText
          id="email"
          type="email"
          placeholder="user@example.com"
          [ngModel]="newEmail()"
          (ngModelChange)="newEmail.set($event)"
          class="w-full"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label for="phone" class="text-sm font-medium text-gray-700">Phone</label>
        <input
          pInputText
          id="phone"
          placeholder="+961 71 000 000"
          [ngModel]="newPhone()"
          (ngModelChange)="newPhone.set($event)"
          class="w-full"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label for="password" class="text-sm font-medium text-gray-700">Password *</label>
        <p-password
          id="password"
          placeholder="Min 8 characters"
          [ngModel]="newPassword()"
          (ngModelChange)="newPassword.set($event)"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full"
        />
      </div>
    </div>
    <ng-template pTemplate="footer">
      <p-button label="Cancel" severity="secondary" styleClass="p-button-text" (click)="showAddDialog.set(false)" />
      <p-button label="Create & Add" [loading]="adding()" (click)="addStaff()" />
    </ng-template>
  </p-dialog>
</div>
