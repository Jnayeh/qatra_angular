<div class="max-w-4xl mx-auto space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Donation History</h1>
    <p class="text-sm text-gray-500 mt-1">Review your past donations and download certificates.</p>
  </div>

  @if (isLoading()) {
    <app-loading-spinner />
  } @else if (donations().length === 0) {
    <app-empty-state icon="history" title="No donations yet" message="Your donation history will appear here." />
  } @else {
    <p-card styleClass="overflow-hidden">
      <ng-template pTemplate="content">
        <p-table [value]="donations()" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[5, 10, 25]" [showCurrentPageReport]="true">
          <ng-template pTemplate="header">
            <tr>
              <th class="text-gray-500">Donor</th>
              <th class="text-gray-500">Appointment</th>
              <th class="text-gray-500">Certificate</th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-row>
            <tr>
              <td>{{ row.donorName }}</td>
              <td>#{{ row.appointmentId }}</td>
              <td>
                @if (row.downloadUrl) {
                  <p-button icon="pi pi-download" [rounded]="true" [text]="true" severity="primary" (click)="openUrl(row.downloadUrl)" />
                } @else {
                  <span class="text-gray-400">ÔÇö</span>
                }
              </td>
            </tr>
          </ng-template>
        </p-table>
      </ng-template>
    </p-card>
  }
</div>
