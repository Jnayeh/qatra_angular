<div class="max-w-2xl mx-auto space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">My Location</h1>
    <p class="text-sm text-gray-500 mt-1">Click on the map to set your location, or use your current location.</p>
  </div>

  <div class="bg-white rounded-xl border border-gray-200 p-5">
    <app-location-picker [locationForm]="form" />
    <div class="mt-4">
      <p-button label="Save Location" (onClick)="saveLocation()" [disabled]="form.value.latitude === null || form.value.longitude === null" />
    </div>
  </div>
</div>
