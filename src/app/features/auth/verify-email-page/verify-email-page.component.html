<div class="min-h-screen flex items-center justify-center auth-surface-donor">
  <div class="w-full max-w-md rounded-2xl bg-white overflow-hidden auth-card-donor">
    <div class="px-6 pt-4 pb-2 text-center">
      <p class="text-3xl font-bold text-primary-600 mb-1">Qatra</p>
      <p class="inline-flex items-center gap-1.5 text-xs font-semibold px-3 py-1 rounded-full mb-4 bg-primary-50 text-primary-700">
        <i class="pi pi-envelope text-xs"></i>
        Email Verification
      </p>
      <h1 class="text-2xl font-bold text-gray-900 mt-2">Verify Email</h1>
    </div>

    <div class="px-6 pb-8 pt-4">
      @if (isLoading()) {
        <div class="flex flex-col items-center gap-3 py-6">
          <i class="pi pi-spin pi-spinner text-2xl text-primary-500"></i>
          <p class="text-sm text-gray-500">Verifying your email...</p>
        </div>
      } @else if (verified()) {
        <div class="text-center py-4">
          <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mx-auto mb-4">
            <i class="pi pi-check text-3xl text-green-600"></i>
          </div>
          <p class="text-gray-900 font-medium mb-2">Email verified!</p>
          <p class="text-sm text-gray-500 mb-4">Your email has been confirmed. You can now use all features of your account.</p>
        </div>
      } @else {
        <div class="text-center py-4">
          <div class="w-16 h-16 rounded-full bg-red-100 flex items-center justify-center mx-auto mb-4">
            <i class="pi pi-times text-3xl text-red-600"></i>
          </div>
          <p class="text-gray-900 font-medium mb-2">Verification failed</p>
          <p class="text-sm text-gray-500 mb-4">{{ error() }}</p>
          <a routerLink="/auth/login" p-button severity="primary" label="Go to Login"></a>
        </div>
      }
    </div>
  </div>
</div>
