<div class="flex flex-col h-full">

  <header class="sticky top-0 z-40 bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-[1400px] mx-auto flex items-center justify-between px-4 h-14">

      <a routerLink="/donor/home" class="flex items-center gap-2 shrink-0">
        <div class="w-8 h-8 bg-primary-600 rounded-lg flex items-center justify-center">
          <span class="text-white font-bold text-sm">Q</span>
        </div>
        <span class="text-lg font-bold text-gray-900 hidden sm:inline">Qatra</span>
      </a>


      <nav class="hidden lg:flex items-center gap-1">
        @for (link of navLinks; track link.path) {
          <a
            [routerLink]="link.path"
            routerLinkActive="nav-link-active"
            [routerLinkActiveOptions]="{ exact: link.path === '/donor/home' }"
            class="flex items-center gap-2 px-3 py-2 rounded-xl text-sm font-medium text-gray-500 no-underline whitespace-nowrap hover:text-gray-900 hover:bg-gray-100"
          >
            <i class="pi {{ link.icon }} text-sm"></i>
            <span>{{ link.label }}</span>
          </a>
        }
      </nav>


      <div class="flex items-center gap-2">
        <app-notification-bell />
        <p-menu #userMenu [model]="menuItems()" [popup]="true" styleClass="donor-user-menu" />
        <button
          (click)="userMenu.toggle($event)"
          class="flex items-center gap-2 px-2 py-1 rounded-xl border-none bg-transparent cursor-pointer hover:bg-gray-100"
        >
          <p-avatar
            [label]="getInitials()"
            shape="circle"
            styleClass="!bg-primary-600 !text-white !text-xs !w-8 !h-8"
          />
          <span class="hidden sm:inline text-sm font-medium text-gray-700 max-w-[100px] truncate">
            {{ authStore.user()?.displayName ?? 'Donor' }}
          </span>
          <i class="pi pi-chevron-down text-xs text-gray-400"></i>
        </button>
      </div>
    </div>
  </header>


  @if (showProfileBanner()) {
    <a routerLink="/donor/onboarding" class="sticky top-0 z-40 flex items-center justify-center gap-3 px-4 py-2 bg-amber-50 border-b border-amber-200 hover:bg-amber-100 cursor-pointer">
      <i class="pi pi-info-circle text-amber-600"></i>
      <span class="text-sm font-medium text-amber-800">Complete your profile to unlock all features</span>
      <span class="text-xs text-amber-600 font-semibold">Get Started &rarr;</span>
    </a>
  }


  <main class="flex-1 overflow-y-auto pb-14 bg-gray-50 mx-auto w-full lg:pb-0">
    <router-outlet />
  </main>


  <nav class="lg:hidden fixed bottom-0 left-0 right-0 z-50 flex items-center justify-around h-14 bg-white border-t border-gray-200 shadow-sm pb-[env(safe-area-inset-bottom)]">
    @for (link of navLinks; track link.path; let i = $index) {
      @if (i < 5) {
        <a
          [routerLink]="link.path"
          routerLinkActive="bottom-tab-active"
          [routerLinkActiveOptions]="{ exact: link.path === '/donor/home' }"
          class="flex flex-col items-center justify-center gap-1 flex-1 py-1 text-gray-400 no-underline active:opacity-70"
        >
          <i class="pi {{ link.icon }} text-lg"></i>
          <span class="text-xs">{{ link.label }}</span>
        </a>
      }
    }
  </nav>
</div>
