<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Qatra - Blood Donation Platform</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-surface-dark antialiased">
  <app-root>
    <div class="qatra-loader">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 6C24 6 10 20.5 10 30a14 14 0 0 0 28 0C38 20.5 24 6 24 6Z" stroke="#C0182A" stroke-width="2" stroke-linejoin="round"></path>
        <path d="M17 32a7 7 0 0 0 5 6.5" stroke="#C0182A" stroke-width="2" stroke-linecap="round"></path>
      </svg>
    </div>
  </app-root>
  <style>
    .qatra-loader {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      animation: qatra-pulse 1.4s ease-in-out infinite;
    }
    .qatra-loader svg {
      width: 64px;
      height: 64px;
      animation: qatra-drop 1.4s ease-in-out infinite;
    }
    @keyframes qatra-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes qatra-drop {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
  </style>
</body>
</html>
