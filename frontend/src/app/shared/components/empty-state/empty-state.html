<div class="flex flex-col items-center justify-center p-12 text-center">
  <i class="pi pi-{{ icon() }} text-6xl text-gray-600 mb-4"></i>
  <h3 class="text-xl font-medium text-gray-400 mb-2">{{ title() }}</h3>
  <p class="text-sm text-gray-500 max-w-md">{{ message() }}</p>
  @if (actionLabel()) {
    <p-button [label]="actionLabel()" severity="primary" (click)="action.emit()" class="mt-4"></p-button>
  }
</div>
