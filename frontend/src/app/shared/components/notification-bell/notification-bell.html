<button mat-icon-button [matMenuTriggerFor]="notifMenu" (click)="open()">
  <mat-icon [matBadge]="unreadCount()" matBadgeColor="warn">notifications</mat-icon>
</button>

<mat-menu #notifMenu="matMenu" class="notification-menu">
  <div class="px-4 py-2 text-sm font-medium border-b border-gray-700">
    Notifications
  </div>

  @for (notif of recentNotifications(); track notif.id) {
    <button mat-menu-item [routerLink]="['/notifications']" class="notification-item">
      <div class="flex flex-col gap-1 max-w-64">
        <span class="text-sm font-medium" [class.font-bold]="notif.status !== 'READ'">
          {{ notif.title }}
        </span>
        <span class="text-xs text-gray-400 truncate">{{ notif.body }}</span>
      </div>
    </button>
  }

  @if (recentNotifications().length === 0) {
    <div class="px-4 py-6 text-center text-sm text-gray-400">
      No notifications
    </div>
  }

  <a mat-menu-item [routerLink]="['/notifications']" class="border-t border-gray-700 text-primary-400">
    View all
  </a>
</mat-menu>
