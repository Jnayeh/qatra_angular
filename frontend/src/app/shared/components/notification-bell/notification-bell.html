<span class="relative">
  <p-button icon="pi pi-bell" severity="secondary" [rounded]="true" [text]="true" (click)="notifMenu.toggle($event); open()"></p-button>
  @if (unreadCount() > 0) {
    <p-badge [value]="unreadCount()" severity="danger" class="absolute -top-2 -right-1 pointer-events-none"></p-badge>
  }
</span>

<p-menu #notifMenu [model]="menuItems()" [popup]="true">
  <ng-template pTemplate="header">
    <div class="px-4 py-2 text-sm font-medium border-b border-gray-700">
      Notifications
    </div>
  </ng-template>
  <ng-template pTemplate="footer">
    <a pButton [routerLink]="['/notifications']" class="w-full block text-center px-4 py-2 border-t border-gray-700 text-primary-400 text-sm" severity="secondary" [text]="true">View all</a>
  </ng-template>
</p-menu>
