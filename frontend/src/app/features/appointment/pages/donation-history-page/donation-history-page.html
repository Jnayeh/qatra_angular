    <div class="max-w-4xl mx-auto space-y-6">
      <h1 class="text-2xl font-bold text-white">Donation History</h1>

      <p-card class="bg-surface-card">
        <ng-template pTemplate="content">
          <div class="flex flex-wrap items-center gap-4">
            <div class="flex flex-col gap-1 w-40">
              <label for="fromPicker">From</label>
              <p-datepicker [(ngModel)]="dateFrom" inputId="fromPicker" (onSelect)="applyFilter()" class="w-full" />
            </div>
            <div class="flex flex-col gap-1 w-40">
              <label for="toPicker">To</label>
              <p-datepicker [(ngModel)]="dateTo" inputId="toPicker" (onSelect)="applyFilter()" class="w-full" />
            </div>
            <p-button label="Clear" severity="secondary" [outlined]="true" (click)="clearFilter()" />
          </div>
        </ng-template>
      </p-card>

      @if (isLoading()) {
        <app-loading-spinner />
      } @else if (donations().length === 0) {
        <app-empty-state icon="history" title="No donations yet" message="Your donation history will appear here." />
      } @else {
        <p-card class="bg-surface-card overflow-hidden">
          <ng-template pTemplate="content">
            <p-table [value]="donations()" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[5, 10, 25]" sortField="date" [sortOrder]="-1" [showCurrentPageReport]="true">
              <ng-template pTemplate="header">
                <tr>
                  <th pSortableColumn="date">Date <p-sortIcon field="date" /></th>
                  <th pSortableColumn="center">Center <p-sortIcon field="center" /></th>
                  <th pSortableColumn="mlCollected">ML Collected <p-sortIcon field="mlCollected" /></th>
                  <th>Certificate</th>
                </tr>
              </ng-template>
              <ng-template pTemplate="body" let-row>
                <tr>
                  <td>{{ row.date }}</td>
                  <td>{{ row.center }}</td>
                  <td>{{ row.mlCollected }} ml</td>
                  <td>
                    @if (row.certificateUrl) {
                      <p-button icon="pi pi-download" [rounded]="true" [text]="true" severity="primary" (click)="openUrl(row.certificateUrl)" />
                    } @else {
                      <span class="text-gray-500">—</span>
                    }
                  </td>
                </tr>
              </ng-template>
            </p-table>
          </ng-template>
        </p-card>
      }
    </div>
