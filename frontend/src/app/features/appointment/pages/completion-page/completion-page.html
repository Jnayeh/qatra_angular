    <div class="max-w-2xl mx-auto space-y-6">
      <h1 class="text-2xl font-bold text-white">Complete Appointment</h1>

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <p-card class="bg-surface-card">
          <ng-template pTemplate="content">
            <div class="space-y-4">
              <div class="flex flex-col gap-1">
                <label for="mlCollected">ML Collected</label>
                <p-inputNumber formControlName="mlCollected" inputId="mlCollected" placeholder="450" class="w-full" [min]="1" />
                @if (form.get('mlCollected')?.invalid && form.get('mlCollected')?.touched) {
                  @if (form.get('mlCollected')?.hasError('required')) { <small class="text-red-500">Required</small> }
                  @if (form.get('mlCollected')?.hasError('min')) { <small class="text-red-500">At least 1 ml</small> }
                }
              </div>

              <div class="flex flex-col gap-1">
                <label for="bloodType">Blood Type (optional)</label>
                <p-select formControlName="bloodType" [options]="bloodTypeOptions" optionLabel="label" optionValue="value" class="w-full" />
              </div>

              <div class="flex flex-col gap-1">
                <label for="notes">Notes</label>
                <textarea pTextarea id="notes" formControlName="notes" rows="3" placeholder="Optional notes..." class="w-full"></textarea>
              </div>
            </div>
          </ng-template>
        </p-card>

        <div class="flex justify-end gap-2">
          <p-button label="Cancel" severity="secondary" [outlined]="true" type="button" routerLink="/appointments/staff-queue" />
          <p-button label="Complete Donation" severity="primary" type="submit" [disabled]="form.invalid || submitting()" [loading]="submitting()" />
        </div>
      </form>

      @if (error()) {
        <p class="text-red-400 text-sm">{{ error() }}</p>
      }
    </div>
