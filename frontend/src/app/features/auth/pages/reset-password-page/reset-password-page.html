<div class="min-h-screen flex items-center justify-center bg-surface-dark p-4">
  <mat-card class="w-full max-w-md bg-surface-card">
    <mat-card-header class="flex flex-col items-center pb-4">
      <h1 class="text-2xl font-bold text-primary-500 mb-1">Reset Password</h1>
      <p class="text-sm text-gray-400">Enter your new password</p>
    </mat-card-header>

    <mat-card-content>
      @if (!success()) {
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
          <mat-form-field appearance="outline" class="w-full">
            <mat-label>New Password</mat-label>
            <input matInput type="password" formControlName="newPassword" />
            <mat-error>Password must be at least 8 characters</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Confirm Password</mat-label>
            <input matInput type="password" formControlName="confirmPassword" />
            @if (form.hasError('mismatch')) {
              <mat-error>Passwords do not match</mat-error>
            }
          </mat-form-field>

          @if (error()) {
            <mat-error class="text-center">{{ error() }}</mat-error>
          }

          <button mat-raised-button color="primary" type="submit" class="w-full" [disabled]="form.invalid || isLoading()">
            @if (isLoading()) {
              <mat-spinner diameter="20" class="inline-block" />
            } @else {
              Reset Password
            }
          </button>

          <div class="text-center text-sm">
            <a routerLink="/auth/login" class="text-primary-400 hover:underline">Back to login</a>
          </div>
        </form>
      } @else {
        <div class="text-center py-4">
          <mat-icon class="text-5xl text-green-500 mb-4">check_circle</mat-icon>
          <p class="text-gray-300 mb-2">Password reset successful!</p>
          <a routerLink="/auth/login" class="text-primary-400 hover:underline block mt-4">Sign in</a>
        </div>
      }
    </mat-card-content>
  </mat-card>
</div>
