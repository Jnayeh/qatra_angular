<div class="min-h-screen flex items-center justify-center bg-surface-dark p-4">
  <p-card class="w-full max-w-md bg-surface-card">
    <ng-template pTemplate="header">
      <div class="flex flex-col items-center pb-4 pt-4">
        <h1 class="text-2xl font-bold text-primary-500 mb-1">Verify Email</h1>
      </div>
    </ng-template>

    <ng-template pTemplate="content">
      @if (!verified()) {
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
          <p class="text-sm text-gray-400 text-center mb-4">
            Enter the verification token sent to your email
          </p>

          <div class="flex flex-col gap-1">
            <label for="token">Verification Token</label>
            <input pInputText id="token" formControlName="token" placeholder="Enter token" class="w-full" [class.ng-invalid]="form.get('token')?.invalid && form.get('token')?.touched" />
            @if (form.get('token')?.invalid && form.get('token')?.touched) {
              <small class="text-red-500">Token is required</small>
            }
          </div>

          @if (error()) {
            <p-message severity="error" variant="simple" size="small">{{ error() }}</p-message>
          }

          <p-button label="Verify Email" severity="primary" type="submit" class="w-full" [disabled]="form.invalid || isLoading()" [loading]="isLoading()"></p-button>
        </form>
      } @else {
        <div class="text-center py-4">
          <i class="pi pi-check-circle text-5xl text-green-500 mb-4 block"></i>
          <p class="text-gray-300 mb-2">Email verified!</p>
          <a routerLink="/auth/login" class="text-primary-400 hover:underline block mt-4">Sign in</a>
        </div>
      }
    </ng-template>
  </p-card>
</div>
