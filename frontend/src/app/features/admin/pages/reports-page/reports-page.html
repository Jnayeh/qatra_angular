    <div class="space-y-6">
      <h1 class="text-2xl font-bold text-white">Reports</h1>

      <p-card class="bg-surface-card">
        <ng-template pTemplate="content">
          <div class="flex flex-wrap items-center gap-4">
            <div class="flex flex-col gap-1">
              <label for="fromDp">From</label>
              <p-datepicker [(ngModel)]="dateFrom" inputId="fromDp" class="w-36" />
            </div>
            <div class="flex flex-col gap-1">
              <label for="toDp">To</label>
              <p-datepicker [(ngModel)]="dateTo" inputId="toDp" class="w-36" />
            </div>
            <div class="flex flex-col gap-1">
              <label for="reportType">Report Type</label>
              <p-select [(ngModel)]="reportType" inputId="reportType" [options]="reportTypeOptions" optionValue="value" optionLabel="label" class="w-44" />
            </div>
            <p-button severity="primary" (click)="generate()" [disabled]="generating()">
              @if (generating()) {
                <p-progressSpinner styleClass="w-5 h-5" strokeWidth="4" />
              } @else {
                Generate
              }
            </p-button>
          </div>
        </ng-template>
      </p-card>

      @if (reportData().length > 0) {
        <p-card class="bg-surface-card overflow-hidden">
          <ng-template pTemplate="title">Results</ng-template>
          <ng-template pTemplate="content">
            <p-table [value]="reportData()" [tableStyle]="{'min-width': '50rem'}">
              <ng-template pTemplate="header">
                <tr>
                  @for (col of reportColumns(); track col) {
                    <th class="text-gray-400 uppercase text-xs">{{ col }}</th>
                  }
                </tr>
              </ng-template>
              <ng-template pTemplate="body" let-row>
                <tr class="hover:bg-surface-hover">
                  @for (col of reportColumns(); track col) {
                    <td>{{ row[col] }}</td>
                  }
                </tr>
              </ng-template>
            </p-table>
          </ng-template>
          <ng-template pTemplate="footer">
            <div class="flex justify-end">
              <p-button label="Export CSV" icon="pi pi-download" severity="secondary" styleClass="p-button-outlined" (click)="exportCsv()" />
            </div>
          </ng-template>
        </p-card>
      }
    </div>
