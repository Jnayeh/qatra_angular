    <div class="space-y-6">
      <h1 class="text-2xl font-bold text-white">Reports</h1>

      <mat-card class="bg-surface-card">
        <mat-card-content>
          <div class="flex flex-wrap items-center gap-4">
            <mat-form-field appearance="outline" class="w-36">
              <mat-label>From</mat-label>
              <input matInput [matDatepicker]="fromDp" [(ngModel)]="dateFrom" />
              <mat-datepicker-toggle matSuffix [for]="fromDp" />
              <mat-datepicker #fromDp />
            </mat-form-field>
            <mat-form-field appearance="outline" class="w-36">
              <mat-label>To</mat-label>
              <input matInput [matDatepicker]="toDp" [(ngModel)]="dateTo" />
              <mat-datepicker-toggle matSuffix [for]="toDp" />
              <mat-datepicker #toDp />
            </mat-form-field>
            <mat-form-field appearance="outline" class="w-44">
              <mat-label>Report Type</mat-label>
              <mat-select [(ngModel)]="reportType">
                <mat-option value="DONATIONS">Donations</mat-option>
                <mat-option value="DONORS">Donors</mat-option>
                <mat-option value="CENTERS">Centers</mat-option>
                <mat-option value="EMERGENCIES">Emergencies</mat-option>
              </mat-select>
            </mat-form-field>
            <button mat-raised-button color="primary" (click)="generate()" [disabled]="generating()">
              @if (generating()) {
                <mat-spinner diameter="20" />
              } @else {
                Generate
              }
            </button>
          </div>
        </mat-card-content>
      </mat-card>

      @if (reportData().length > 0) {
        <mat-card class="bg-surface-card overflow-hidden">
          <mat-card-header class="flex items-center justify-between">
            <mat-card-title class="text-white text-lg">Results</mat-card-title>
            <button mat-stroked-button (click)="exportCsv()">
              <mat-icon>download</mat-icon> Export CSV
            </button>
          </mat-card-header>
          <mat-card-content class="p-0">
            <table mat-table [dataSource]="reportData()" class="w-full">
              @for (col of reportColumns(); track col) {
                <ng-container [matColumnDef]="col">
                  <th mat-header-cell *matHeaderCellDef class="text-gray-400 uppercase text-xs">{{ col }}</th>
                  <td mat-cell *matCellDef="let row">{{ row[col] }}</td>
                </ng-container>
              }
              <tr mat-header-row *matHeaderRowDef="reportColumns()"></tr>
              <tr mat-row *matRowDef="let row; columns: reportColumns()" class="hover:bg-surface-hover"></tr>
            </table>
          </mat-card-content>
        </mat-card>
      }
    </div>
