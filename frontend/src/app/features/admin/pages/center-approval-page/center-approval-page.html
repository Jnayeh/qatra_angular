    <div class="space-y-6">
      <h1 class="text-2xl font-bold text-white">Center Approval</h1>

      @for (c of pendingCenters(); track c.id) {
        <p-card class="bg-surface-card">
          <ng-template pTemplate="content">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-white font-medium">{{ c.name }}</p>
                <p class="text-sm text-gray-400">{{ c.city }}, {{ c.country }}</p>
                <app-status-badge [status]="c.status" />
              </div>
              <div class="flex gap-2">
                <p-button label="Approve" severity="primary" (click)="approve(c.id, true)" />
                <p-button label="Reject" severity="danger" styleClass="p-button-outlined" (click)="approve(c.id, false)" />
              </div>
            </div>
          </ng-template>
        </p-card>
      } @empty {
        <p class="text-gray-400">No pending center registrations.</p>
      }
    </div>
