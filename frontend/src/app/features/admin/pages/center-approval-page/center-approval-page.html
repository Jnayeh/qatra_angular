<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Center Approval</h1>
    <p class="text-sm text-gray-500 mt-1">Review and approve pending center registrations.</p>
  </div>

  @for (c of pendingCenters(); track c.id) {
    <p-card>
      <ng-template pTemplate="content">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-gray-900 font-semibold">{{ c.name }}</p>
            <p class="text-sm text-gray-500">{{ c.city }}, {{ c.country }}</p>
            <app-status-badge [status]="c.status" />
          </div>
          <div class="flex gap-2">
            <p-button label="Approve" severity="primary" (click)="approve(c.id, true)" />
            <p-button label="Reject" severity="danger" styleClass="p-button-outlined" (click)="approve(c.id, false)" />
          </div>
        </div>
      </ng-template>
    </p-card>
  } @empty {
    <app-empty-state icon="check-circle" title="No pending approvals" message="All center registrations have been reviewed." />
  }
</div>
