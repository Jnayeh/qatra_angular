    <div class="space-y-6">
      <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-white">User Management</h1>
      </div>

      <p-card class="bg-surface-card">
        <ng-template pTemplate="content">
          <p-table [value]="users()" [tableStyle]="{'min-width': '50rem'}">
            <ng-template pTemplate="header">
              <tr>
                <th class="text-gray-400">Name</th>
                <th class="text-gray-400">Email</th>
                <th class="text-gray-400">Status</th>
                <th class="text-gray-400">Roles</th>
                <th class="text-gray-400">Actions</th>
              </tr>
            </ng-template>
            <ng-template pTemplate="body" let-u>
              <tr>
                <td class="text-white">{{ u.displayName }}</td>
                <td class="text-white">{{ u.email }}</td>
                <td><app-status-badge [status]="u.status" /></td>
                <td class="text-white">{{ u.roles.join(', ') }}</td>
                <td>
                  <p-button icon="pi pi-eye" [rounded]="true" [text]="true" severity="secondary" [routerLink]="['/admin/users', u.id]" />
                </td>
              </tr>
            </ng-template>
          </p-table>
        </ng-template>
      </p-card>
    </div>
