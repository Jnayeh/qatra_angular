    <div class="space-y-6">
      <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-white">User Management</h1>
      </div>

      <mat-card class="bg-surface-card">
        <mat-card-content>
          <table mat-table [dataSource]="users()" class="w-full">
            <ng-container matColumnDef="displayName">
              <th mat-header-cell *matHeaderCellDef class="text-gray-400">Name</th>
              <td mat-cell *matCellDef="let u" class="text-white">{{ u.displayName }}</td>
            </ng-container>
            <ng-container matColumnDef="email">
              <th mat-header-cell *matHeaderCellDef class="text-gray-400">Email</th>
              <td mat-cell *matCellDef="let u" class="text-white">{{ u.email }}</td>
            </ng-container>
            <ng-container matColumnDef="status">
              <th mat-header-cell *matHeaderCellDef class="text-gray-400">Status</th>
              <td mat-cell *matCellDef="let u"><app-status-badge [status]="u.status" /></td>
            </ng-container>
            <ng-container matColumnDef="roles">
              <th mat-header-cell *matHeaderCellDef class="text-gray-400">Roles</th>
              <td mat-cell *matCellDef="let u" class="text-white">{{ u.roles.join(', ') }}</td>
            </ng-container>
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef class="text-gray-400">Actions</th>
              <td mat-cell *matCellDef="let u">
                <button mat-icon-button [routerLink]="['/admin/users', u.id]" color="primary">
                  <mat-icon>visibility</mat-icon>
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns" class="border-b border-gray-700"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="hover:bg-surface-hover border-b border-gray-800"></tr>
          </table>
        </mat-card-content>
      </mat-card>
    </div>
