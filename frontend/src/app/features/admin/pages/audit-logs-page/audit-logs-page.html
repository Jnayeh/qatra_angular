    <div class="space-y-6">
      <h1 class="text-2xl font-bold text-white">Audit Logs</h1>

      <p-card class="bg-surface-card">
        <ng-template pTemplate="content">
          <p-table [value]="logs()" [tableStyle]="{'min-width': '50rem'}">
            <ng-template pTemplate="header">
              <tr>
                <th class="text-gray-400">Timestamp</th>
                <th class="text-gray-400">Action</th>
                <th class="text-gray-400">Entity</th>
                <th class="text-gray-400">User</th>
              </tr>
            </ng-template>
            <ng-template pTemplate="body" let-l>
              <tr>
                <td class="text-white text-sm">{{ l.timestamp }}</td>
                <td class="text-white">{{ l.action }}</td>
                <td class="text-white">{{ l.entityType }}</td>
                <td class="text-white text-sm">#{{ l.userId }}</td>
              </tr>
            </ng-template>
          </p-table>
        </ng-template>
      </p-card>
    </div>
