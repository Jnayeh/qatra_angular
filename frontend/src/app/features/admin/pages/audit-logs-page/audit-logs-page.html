    <div class="space-y-6">
      <h1 class="text-2xl font-bold text-white">Audit Logs</h1>

      <mat-card class="bg-surface-card">
        <mat-card-content>
          <table mat-table [dataSource]="logs()" class="w-full">
            <ng-container matColumnDef="timestamp">
              <th mat-header-cell *matHeaderCellDef class="text-gray-400">Timestamp</th>
              <td mat-cell *matCellDef="let l" class="text-white text-sm">{{ l.timestamp }}</td>
            </ng-container>
            <ng-container matColumnDef="action">
              <th mat-header-cell *matHeaderCellDef class="text-gray-400">Action</th>
              <td mat-cell *matCellDef="let l" class="text-white">{{ l.action }}</td>
            </ng-container>
            <ng-container matColumnDef="entityType">
              <th mat-header-cell *matHeaderCellDef class="text-gray-400">Entity</th>
              <td mat-cell *matCellDef="let l" class="text-white">{{ l.entityType }}</td>
            </ng-container>
            <ng-container matColumnDef="userId">
              <th mat-header-cell *matHeaderCellDef class="text-gray-400">User</th>
              <td mat-cell *matCellDef="let l" class="text-white text-sm">#{{ l.userId }}</td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="cols" class="border-b border-gray-700"></tr>
            <tr mat-row *matRowDef="let row; columns: cols;" class="hover:bg-surface-hover border-b border-gray-800"></tr>
          </table>
        </mat-card-content>
      </mat-card>
    </div>
