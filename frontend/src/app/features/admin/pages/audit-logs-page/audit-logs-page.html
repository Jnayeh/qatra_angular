<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Audit Logs</h1>
    <p class="text-sm text-gray-500 mt-1">Track all system actions and changes for accountability.</p>
  </div>

  <p-card>
    <ng-template pTemplate="content">
      <p-table [value]="logs()" [tableStyle]="{'min-width': '50rem'}">
        <ng-template pTemplate="header">
          <tr>
            <th class="text-gray-500">Timestamp</th>
            <th class="text-gray-500">Action</th>
            <th class="text-gray-500">Entity</th>
            <th class="text-gray-500">User</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-l>
          <tr>
            <td class="text-gray-900 text-sm">{{ l.timestamp }}</td>
            <td class="text-gray-900">{{ l.action }}</td>
            <td class="text-gray-900">{{ l.entityType }}</td>
            <td class="text-gray-900 text-sm">#{{ l.userId }}</td>
          </tr>
        </ng-template>
      </p-table>
    </ng-template>
  </p-card>
</div>
