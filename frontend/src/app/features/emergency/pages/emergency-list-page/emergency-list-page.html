<div class="space-y-6">
  <div class="flex items-center justify-between">
    <h1 class="text-2xl font-bold text-white">Emergencies</h1>
    <p-button label="New Emergency" severity="primary" routerLink="/emergencies/create" icon="pi pi-plus"></p-button>
  </div>

  @if (store.isLoading()) {
    <app-loading-spinner />
  } @else if (store.emergencies().length === 0) {
    <app-empty-state icon="exclamation-triangle" title="No emergencies" message="There are no active emergencies at this time." />
  } @else {
    <div class="grid gap-4">
      @for (e of store.emergencies(); track e.id) {
        <p-card class="bg-surface-card cursor-pointer hover:bg-surface-hover" [routerLink]="['/emergencies', e.id]">
          <ng-template pTemplate="content">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-4">
                <i class="pi pi-exclamation-triangle text-red-500 text-3xl"></i>
                <div>
                  <p class="text-white font-medium">Blood {{ e.bloodType }} – {{ e.unitsNeeded }} units needed</p>
                  <p class="text-sm text-gray-400">Center #{{ e.centerId }} • Urgency: {{ e.urgency }}</p>
                </div>
              </div>
              <app-status-badge [status]="e.status" />
            </div>
          </ng-template>
        </p-card>
      }
    </div>
  }
</div>
