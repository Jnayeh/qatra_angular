<div class="max-w-2xl mx-auto space-y-6">
  <h1 class="text-2xl font-bold text-white">Notification Preferences</h1>

  <mat-card class="bg-surface-card">
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
        <mat-form-field appearance="outline">
          <mat-label>Notification Frequency</mat-label>
          <mat-select formControlName="frequency">
            <mat-option value="IMMEDIATE">Immediate</mat-option>
            <mat-option value="DAILY_DIGEST">Daily Digest</mat-option>
            <mat-option value="EMERGENCY_ONLY">Emergency Only</mat-option>
            <mat-option value="DISABLED">Disabled</mat-option>
          </mat-select>
        </mat-form-field>

        <div class="flex items-center justify-between">
          <span class="text-gray-300">Quiet Hours</span>
          <mat-slide-toggle formControlName="enableQuietHours" color="primary" />
        </div>

        @if (form.get('enableQuietHours')?.value) {
          <div class="grid grid-cols-2 gap-4">
            <mat-form-field appearance="outline">
              <mat-label>Start (HH:mm)</mat-label>
              <input matInput formControlName="quietStart" placeholder="22:00" />
            </mat-form-field>
            <mat-form-field appearance="outline">
              <mat-label>End (HH:mm)</mat-label>
              <input matInput formControlName="quietEnd" placeholder="07:00" />
            </mat-form-field>
          </div>
        }

        <div class="flex items-center justify-between">
          <span class="text-gray-300">Allow Emergency Notifications</span>
          <mat-slide-toggle formControlName="allowEmergencyNotifications" color="primary" />
        </div>

        <mat-form-field appearance="outline">
          <mat-label>Max Notification Distance (km)</mat-label>
          <input matInput type="number" formControlName="maxNotificationDistanceKm" />
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
          Save Preferences
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
