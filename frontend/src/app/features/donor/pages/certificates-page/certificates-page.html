<div class="max-w-4xl mx-auto space-y-6">
  <h1 class="text-2xl font-bold text-white">Donation Certificates</h1>

  @if (store.certificates().length === 0) {
    <app-empty-state
      icon="card_membership"
      title="No certificates yet"
      message="Your donation certificates will appear here after your first donation."
    />
  }

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    @for (cert of store.certificates(); track cert.donationDate) {
      <mat-card class="bg-surface-card">
        <mat-card-content>
          <div class="flex items-start justify-between">
            <div>
              <p class="text-white font-medium">{{ cert.centerName }}</p>
              <p class="text-sm text-gray-400">{{ cert.donationDate }}</p>
              <p class="text-sm text-gray-400">{{ cert.mlCollected }} ml donated</p>
            </div>
            <a [href]="cert.certificateUrl" target="_blank" mat-icon-button color="primary">
              <mat-icon>download</mat-icon>
            </a>
          </div>
        </mat-card-content>
      </mat-card>
    }
  </div>
</div>
