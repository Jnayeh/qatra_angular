<div class="max-w-2xl mx-auto space-y-6">
  <h1 class="text-2xl font-bold text-white">Blood Type</h1>

  <mat-card class="bg-surface-card">
    <mat-card-content>
      @if (store.bloodTypeVerified()) {
        <div class="flex items-center gap-3 p-4 bg-green-900/30 rounded-lg mb-4">
          <mat-icon class="text-green-400">verified</mat-icon>
          <div>
            <p class="text-green-300 font-medium">Blood Type Verified</p>
            <p class="text-sm text-gray-400">Your blood type ({{ store.profile()?.bloodType }}) has been verified and cannot be changed.</p>
          </div>
        </div>
      }

      <div class="grid grid-cols-3 gap-2 mb-4">
        @for (type of bloodTypes; track type) {
          <button
            mat-stroked-button
            [class.mat-primary]="selectedType() === type"
            [disabled]="store.bloodTypeVerified()"
            (click)="selectedType.set(type)"
            class="p-3"
          >
            {{ formatBloodType(type) }}
          </button>
        }
      </div>

      @if (error()) {
        <mat-error class="block mb-4">{{ error() }}</mat-error>
      }

      <div class="flex gap-4">
        <button
          mat-raised-button
          color="primary"
          [disabled]="!selectedType() || store.bloodTypeVerified()"
          (click)="save()"
        >
          Save Blood Type
        </button>
        <button mat-stroked-button routerLink="/donor/dashboard">Back</button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
