<div class="max-w-2xl mx-auto space-y-6">
  <h1 class="text-2xl font-bold text-white">Availability Status</h1>

  <p-card>
    <div class="flex flex-col gap-4">
      <p class="text-sm text-gray-400 mb-2">Current status: <span class="text-white font-medium">{{ currentStatus() }}</span></p>

      @for (opt of availabilityOptions; track opt.value) {
        <p-button
          [variant]="currentStatus() === opt.label ? undefined : 'outlined'"
          [severity]="currentStatus() === opt.label ? 'primary' : 'secondary'"
          styleClass="justify-start p-4 w-full text-left"
          (click)="setStatus(opt.value)"
        >
          <div class="flex items-center gap-3">
            <i class="pi {{ opt.icon === 'check_circle' ? 'pi-check-circle' : opt.icon === 'pause_circle' ? 'pi-pause-circle' : 'pi-sun' }}"></i>
            <div class="text-left">
              <div class="font-medium">{{ opt.label }}</div>
              <div class="text-xs text-gray-400">{{ opt.description }}</div>
            </div>
          </div>
        </p-button>
      }
    </div>
  </p-card>
</div>
