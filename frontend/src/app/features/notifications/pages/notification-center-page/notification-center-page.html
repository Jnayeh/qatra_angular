    <div class="max-w-4xl mx-auto space-y-6">
      <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-white">Notifications</h1>
        @if (store.notifications().length > 0) {
          <button mat-stroked-button color="primary" (click)="store.markAllAsRead()">
            <mat-icon>done_all</mat-icon> Mark All Read
          </button>
        }
      </div>

      @if (store.notifications().length === 0) {
        <app-empty-state icon="notifications_none" title="No notifications" message="You're all caught up!" />
      } @else {
        <div class="space-y-2">
          @for (n of store.notifications(); track n.id) {
            <mat-card
              class="bg-surface-card cursor-pointer hover:bg-surface-hover"
              [class.border-l-4]="n.status !== 'READ'"
              [class.border-primary-500]="n.status !== 'READ'"
              (click)="store.markAsRead(n.id)"
            >
              <mat-card-content class="flex items-start gap-3 p-4">
                <mat-icon class="mt-1" [class.text-primary-400]="n.status !== 'READ'" [class.text-gray-600]="n.status === 'READ'">
                  {{ notificationIcon(n.type) }}
                </mat-icon>
                <div class="flex-1">
                  <div class="flex items-center justify-between">
                    <p class="text-white font-medium" [class.font-bold]="n.status !== 'READ'">{{ n.title }}</p>
                    <app-status-badge [status]="n.status" />
                  </div>
                  <p class="text-sm text-gray-400 mt-1">{{ n.body }}</p>
                  <p class="text-xs text-gray-600 mt-1">{{ n.createdAt }}</p>
                </div>
              </mat-card-content>
            </mat-card>
          }
        </div>
      }
    </div>
