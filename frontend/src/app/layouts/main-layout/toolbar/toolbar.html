<p-toolbar class="bg-surface-card border-b border-primary-900">
  <ng-template pTemplate="start">
    <p-button icon="pi pi-bars" severity="secondary" [rounded]="true" [text]="true" (click)="menuToggle.emit()" class="mr-2"></p-button>
    <span class="text-lg font-medium">{{ title() }}</span>
  </ng-template>

  <ng-template pTemplate="end">
    @if (authStore.isAuthenticated()) {
      <app-notification-bell />
      <p-button icon="pi pi-user" severity="secondary" [rounded]="true" [text]="true" (click)="userMenu.toggle($event)"></p-button>
      <p-menu #userMenu [model]="menuItems()" [popup]="true"></p-menu>
    }
  </ng-template>
</p-toolbar>
